<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogo das Perguntas - Museu Carmen Miranda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#ff8c42,#e63946,#ffd54f);

    overflow:hidden;
}

.card{

    width:90%;
    max-width:850px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:30px;

    padding:50px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,0.3);

}

.titulo{
    font-size:3rem;
    font-weight:700;
    color:white;
}

.subtitulo{
    color:#ffd54f;
    margin-top:10px;
    font-size:1.2rem;
}

.pergunta-num{
    margin-top:40px;
    color:#ffd54f;
    font-size:1.1rem;
    font-weight:600;
}

.pergunta{
    margin-top:15px;
    color:white;
    font-size:1.8rem;
    font-weight:600;
}

button{

    width:100%;

    margin-top:15px;

    padding:18px;

    border:none;

    border-radius:15px;

    font-size:1rem;

    cursor:pointer;

    transition:0.3s;

    background:white;

    font-weight:600;
}

button:hover{
    transform:translateY(-4px);
}

#resultado{
    margin-top:25px;
    font-size:1.5rem;
    font-weight:bold;
}

.fruta{
    position:absolute;
    font-size:40px;
    opacity:0.15;
}

.f1{
    top:10%;
    left:10%;
}

.f2{
    top:20%;
    right:15%;
}

.f3{
    bottom:15%;
    left:20%;
}

.f4{
    bottom:10%;
    right:10%;
}

</style>
</head>

<body>

<div class="card">

    <h1 class="titulo">Jogo das Perguntas</h1>

    <p class="subtitulo">
        Museu Carmen Miranda
    </p>

    <div class="pergunta-num">
        Pergunta 8
    </div>

    <div class="pergunta">
    Além da música, em que outra área Carmen Miranda teve grande destaque?
</div>

<button onclick="verificar(true)">
    Cinema
</button>

<button onclick="verificar(false)">
    Arquitetura
</button>

<button onclick="verificar(false)">
    Literatura
</button>

    <div id="resultado"></div>

</div>

<script>

function verificar(correta){

    const resultado =
        document.getElementById("resultado");

    if(correta){
        resultado.innerHTML="✅ Correto!";
        resultado.style.color="#7CFF8A";
    }
    else{
        resultado.innerHTML=" Errado!";
        resultado.style.color="#ff2c2c";
    }

}

</script>

</body>
</html>
